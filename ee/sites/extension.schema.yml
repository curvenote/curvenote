# $schema: https://json-schema.org/draft/2020-12/schema
title: 'Sites Extension Module'
description: 'Sites Extension Module Configuration'
type: object
properties:
  task:
    type: boolean
    description: This extension will register one of more tasks
    default: false
  routes:
    type: boolean
    description: This extension will register new routes
  dataModels:
    type: boolean
    description: This extension will register new (prisma) data models and migrations
  workflows:
    type: boolean
    description: This extension will register new workflows
  navigation:
    type: boolean
    description: This extension will register new site navigation items
    default: false
  video:
    description: Video to display in the request site banner
    type: object
    additionalProperties: false
    required:
      - url
    properties:
      title:
        type: string
        description: Optional heading shown above the video player
      url:
        type: string
        description: URL to the video file
      thumbnail:
        type: string
        description: URL to the video thumbnail image
  featured:
    description: Optional featured sites content to display on the sites page
    type: object
    additionalProperties: false
    required:
      - title
      - description
      - sites
    properties:
      title:
        type: string
        description: Featured section title
      description:
        type: string
        description: Featured section description
      sites:
        type: array
        description: List of featured sites to display as mini cards
        items:
          type: object
          additionalProperties: false
          required:
            - title
            - url
            - thumbnail
          properties:
            title:
              type: string
              description: Caption shown under the featured site thumbnail
            url:
              type: string
              description: Featured site URL
            thumbnail:
              type: string
              description: Featured site thumbnail URL
