# YAML `.yml` — local development secrets (not committed).
#
#   cp .app-config.secrets.sample.yml .app-config.secrets.development.yml
#
# Only actual secrets go here. Non-secret instance fields (serviceName, apiUrl,
# integrationName, integrationVersion) live in the environment config
# (e.g. .app-config.development.yml).

apiKey: dev-api-key

instances:
  default:
    apiKey: 'your-api-key'
    signingSecret: 'base64-encoded-signing-secret'
